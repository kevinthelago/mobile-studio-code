name: Expo Preview Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Upload Expo Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export Expo bundle
        run: npx expo export --output-dir dist
        env:
          NODE_ENV: production

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: expo-preview-pr-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 90

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const runId = context.runId;
            const repo = context.repo;
            const artifactUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}/artifacts`;

            const body = [
              '## 📦 Expo Preview Ready',
              '',
              `| | |`,
              `|---|---|`,
              `| **PR** | #${pr} |`,
              `| **Artifact** | [⬇️ Download Bundle](${artifactUrl}) |`,
              `| **Expires** | 90 days |`,
              '',
              '### How to run',
              '1. Download and unzip the artifact above',
              '2. Serve it locally: `npx serve dist/`',
              '3. Open Expo Go → enter the local URL',
              '',
              '> 💡 Tip: branch names like `issue-{number}/short-slug` help trace this back to a GitHub Issue.',
            ].join('\n');

            // Delete previous bot comment if exists
            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: pr,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('Expo Preview Ready')) {
                await github.rest.issues.deleteComment({ ...repo, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              ...repo,
              issue_number: pr,
              body,
            });

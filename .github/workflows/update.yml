name: EAS Update

on:
  push:
    branches: [main, preview]
    tags: ['v*']

jobs:
  update:
    name: Publish Expo update
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve channel
        id: channel
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/preview ]]; then
            echo "name=preview" >> $GITHUB_OUTPUT
          else
            echo "name=main" >> $GITHUB_OUTPUT
          fi

      # Ensure a channel of the same name exists and is linked to the matching
      # branch. EAS Update separates branches (where updates live) from channels
      # (what runtime clients query). `eas update --branch <x>` only touches the
      # branch — without a corresponding channel, Expo Go's
      # `?channel-name=<x>` lookup returns 404. This step is idempotent: it
      # succeeds on first run and no-ops on subsequent runs (the `|| true`
      # swallows the "already exists" exit code).
      - name: Ensure channel exists
        run: |
          eas channel:create ${{ steps.channel.outputs.name }} \
            --json --non-interactive 2>/dev/null || true

      - name: Publish update
        run: |
          eas update \
            --branch ${{ steps.channel.outputs.name }} \
            --message "${{ github.event.head_commit.message }}"
